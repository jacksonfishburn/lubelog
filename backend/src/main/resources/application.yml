server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    schemas: app
    default-schema: app
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    path: /swagger-ui.html

app:
  base-url: https://lubelog.jacksonfishburn.dev
  mail:
    from: ${MAIL_FROM:noreply@lubelog.jacksonfishburn.dev}
  ratelimit:
    enabled: true
    capacity: 100
    refill-tokens: 100
    refill-duration: PT1M

perplexity:
  api-key: ${PERPLEXITY_API_KEY:}