server:
  port: 8081

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: app
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    schemas: app
    default-schema: app
    enabled: true
    locations: classpath:db/migration
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      tags-sorter: alpha
      operations-sorter: alpha
      path: /swagger-ui.html
