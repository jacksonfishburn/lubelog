spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://dummy-issuer
          jwk-set-uri: http://dummy-jwk-set-uri
  mail:
    host: localhost
    port: 1025

app:
  mail:
    from: test@lubelog.local
  ratelimit:
    enabled: false
    capacity: 100
    refill-tokens: 100
    refill-duration: PT1M