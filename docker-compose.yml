services:
  postgres:
    image: postgres:16-alpine
    container_name: lubelog-postgres
    environment:
      POSTGRES_DB: lubelog
      POSTGRES_USER: lubelog
      POSTGRES_PASSWORD: lubelog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lubelog"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: lubelog-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/lubelog
      KC_DB_USERNAME: lubelog
      KC_DB_PASSWORD: lubelog
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: lubelog-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lubelog
      SPRING_DATASOURCE_USERNAME: lubelog
      SPRING_DATASOURCE_PASSWORD: lubelog
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/lubelog
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data: